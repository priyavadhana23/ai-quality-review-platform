worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Rate limiting ──────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;

    upstream backend  { server backend:8000;  keepalive 16; }
    upstream frontend { server frontend:80;   keepalive 8; }

    # ── Development: single HTTP server (no SSL required) ─────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 10M;

        # Security headers (applied even in dev)
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Connection      "";
            proxy_read_timeout 310s;
        }

        location /auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   Connection "";
        }

        location ~ ^/(health|docs|redoc|openapi\.json|metrics) {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        location /webhooks/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   Connection      "";
        }

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host       $host;
            proxy_set_header   Connection "";
        }
    }
}
