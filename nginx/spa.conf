# Nginx config for serving the React SPA and proxying backend endpoints on Railway
server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy backend authentication and API calls to the Railway backend service
    location /auth/login {
        proxy_pass https://ai-quality-review-platform-production-2424.up.railway.app/auth/login;
        proxy_set_header Host ai-quality-review-platform-production-2424.up.railway.app;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/refresh {
        proxy_pass https://ai-quality-review-platform-production-2424.up.railway.app/auth/refresh;
        proxy_set_header Host ai-quality-review-platform-production-2424.up.railway.app;
    }

    location /auth/logout {
        proxy_pass https://ai-quality-review-platform-production-2424.up.railway.app/auth/logout;
        proxy_set_header Host ai-quality-review-platform-production-2424.up.railway.app;
    }

    location /users/ {
        proxy_pass https://ai-quality-review-platform-production-2424.up.railway.app/users/;
        proxy_set_header Host ai-quality-review-platform-production-2424.up.railway.app;
    }

    location /api/ {
        proxy_pass https://ai-quality-review-platform-production-2424.up.railway.app/api/;
        proxy_set_header Host ai-quality-review-platform-production-2424.up.railway.app;
    }

    location /health {
        proxy_pass https://ai-quality-review-platform-production-2424.up.railway.app/health;
        proxy_set_header Host ai-quality-review-platform-production-2424.up.railway.app;
    }

    # All unknown frontend paths → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
