[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is intentionally left as a placeholder.
# The real connection string is read from the APP_DATABASE_URL environment
# variable inside app/db/migrations/env.py.  Set APP_DATABASE_URL before
# running any `alembic` command:
#
#   export APP_DATABASE_URL=postgresql+asyncpg://user:pass@host:5432/dbname
#   alembic upgrade head
#
# The value below is only used if APP_DATABASE_URL is not set (offline mode).
sqlalchemy.url = postgresql+asyncpg://localhost/qrp_dev

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
