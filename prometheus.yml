global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "${ENVIRONMENT:-development}"

scrape_configs:
  # ── FastAPI backend (/metrics exposed by prometheus-fastapi-instrumentator) ──
  - job_name: qrp-backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 30s

  # ── Redis exporter (optional — enable by adding redis-exporter service) ───
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
  #   scrape_interval: 30s
