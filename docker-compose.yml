version: "3.9"

# ── AI Quality Review Platform — Docker Compose ───────────────────────────────
# Services:  backend, frontend, postgres, redis, nginx, worker,
#            prometheus, grafana
# Usage:     docker compose up --build
# Dev mode:  docker compose up --build          (override.yml applied auto)
# Prod mode: docker compose -f docker-compose.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  APP_DATABASE_URL: "postgresql+asyncpg://qrp:${POSTGRES_PASSWORD:-qrppass}@postgres:5432/qrp"
  APP_REDIS_URL: "redis://redis:6379/0"
  APP_JWT_SECRET_KEY: "${APP_JWT_SECRET_KEY:-change-me-in-production}"
  APP_GITHUB_CLIENT_ID: "${APP_GITHUB_CLIENT_ID:-}"
  APP_GITHUB_CLIENT_SECRET: "${APP_GITHUB_CLIENT_SECRET:-}"
  APP_GITHUB_CALLBACK_URL: "${APP_GITHUB_CALLBACK_URL:-http://localhost:8000/auth/callback}"
  APP_FRONTEND_URL: "${APP_FRONTEND_URL:-http://localhost:5173}"
  APP_CORS_ORIGINS: "${APP_CORS_ORIGINS:-http://localhost:5173,http://localhost:80}"
  APP_LOG_LEVEL: "${APP_LOG_LEVEL:-INFO}"
  ENABLE_METRICS: "true"
  GUNICORN_WORKERS: "${GUNICORN_WORKERS:-2}"
  GITHUB__APP_ID: "${GITHUB__APP_ID:-}"
  GITHUB__PRIVATE_KEY: "${GITHUB__PRIVATE_KEY:-}"
  GITHUB__WEBHOOK_SECRET: "${GITHUB__WEBHOOK_SECRET:-}"
  GOOGLE_AI_STUDIO__GEMINI_API_KEY: "${GOOGLE_AI_STUDIO__GEMINI_API_KEY:-}"
  CONFIG__MODEL: "${CONFIG__MODEL:-gemini/gemini-1.5-flash}"

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: qrp
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-qrppass}"
      POSTGRES_DB: qrp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrp -d qrp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend_net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - backend_net

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: runtime
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend_net
      - proxy_net
      - monitoring_net

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: runtime
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=${APP_LOG_LEVEL:-info}
      --concurrency=2
      --queues=ai_tasks,default
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend_net

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8000}"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - proxy_net

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - monitoring_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "${GF_SERVER_ROOT_URL:-http://localhost:3000}"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - monitoring_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  app_data:
  app_logs:
  nginx_logs:
  prometheus_data:
  grafana_data:

networks:
  backend_net:
    driver: bridge
  proxy_net:
    driver: bridge
  monitoring_net:
    driver: bridge
